<div class="filters-container">
  <div class="filter-group">
    <label for="nameOperator">Name</label>

    <select id="nameOperator" aria-label="Name Operator" [(ngModel)]="filters.nameOperator">
      <option value="equals">Equals</option>
      <option value="notEquals">Does Not Equal</option>
    </select>

    <input
      id="studentName"
      type="text"
      aria-label="Student Name"
      placeholder="Student Name"
      [(ngModel)]="filters.name"
    />
  </div>

  <div class="filter-group">
    <label for="departmentOperator">Department</label>

    <select
      id="departmentOperator"
      aria-label="Department Operator"
      [(ngModel)]="filters.departmentOperator"
    >
      <option value="equals">Equals</option>
      <option value="notEquals">Does Not Equal</option>
    </select>

    <input
      id="department"
      type="text"
      aria-label="Department"
      placeholder="Department"
      [(ngModel)]="filters.department"
    />
  </div>

  <div class="filter-group">
    <label for="enrolmentOperator">Enrolment Date</label>

    <select
      id="enrolmentOperator"
      aria-label="Enrolment Date Operator"
      [(ngModel)]="filters.enrolmentOperator"
    >
      <option value="before">Before</option>
      <option value="after">After</option>
    </select>

    <input
      id="enrolmentDate"
      type="date"
      aria-label="Enrolment Date"
      [(ngModel)]="filters.enrolmentDate"
    />
  </div>

  <div class="button-group">
    <button aria-label="Apply Filters" (click)="applyFilters()">Apply Filters</button>

    <button aria-label="Clear Filters" (click)="clearFilters()">Clear</button>
  </div>

  <div class="filter-group">
    <label for="autoRefresh">Auto Refresh</label>

    <select
      id="autoRefresh"
      aria-label="Auto Refresh"
      [(ngModel)]="refreshInterval"
      (change)="onRefreshIntervalChange()"
    >
      <option [ngValue]="5000">5 sec</option>
      <option [ngValue]="10000">10 sec</option>
      <option [ngValue]="30000">30 sec</option>
    </select>
  </div>
</div>
