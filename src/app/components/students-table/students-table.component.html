<div class="table-shell">
  <table class="students-table">
    <thead>
      <tr>
        <th>Id</th>
        <th>Name</th>
        <th>Department</th>
        <th>Enrolment Date</th>
        <th>Status</th>
        <th>Interests</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let student of studentDetails$ | async">
        <td>{{ student.id }}</td>
        <td>{{ student.name }}</td>
        <td>{{ student.department }}</td>
        <td>{{ student.enrolmentDate }}</td>
        <td>{{ student.status }}</td>
        <td>{{ student.interests }}</td>
        <td>
          <div class="action-cell">
            <button
              class="kebab-button"
              type="button"
              (click)="toggleMenu(student.id)"
              aria-label="Open student actions"
            >
              ⋮
            </button>

            <div class="menu" *ngIf="activeMenuStudentId === student.id">
              <button type="button" (click)="deleteStudent(student.id)">Delete</button>
            </div>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
