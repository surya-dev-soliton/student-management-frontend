<nimble-table [data$]="studentDetails$" id-field-name="id">
  <nimble-table-column-text field-name="id"> ID </nimble-table-column-text>

  <nimble-table-column-text field-name="name"> Name </nimble-table-column-text>

  <nimble-table-column-text field-name="department"> Department </nimble-table-column-text>

  <nimble-table-column-text field-name="enrolmentDate"> Enrolment Date </nimble-table-column-text>

  <nimble-table-column-text field-name="status"> Status </nimble-table-column-text>

  <nimble-table-column-text field-name="interests"> Interests </nimble-table-column-text>

  <nimble-table-column column-id="actions">
    <ng-template let-row>
      <div class="action-cell">
        <button
          class="kebab-button"
          type="button"
          (click)="toggleMenu(row.id)"
          aria-label="Open student actions"
        >
          ⋮
        </button>

        <div class="menu" *ngIf="activeMenuStudentId === row.id">
          <button type="button" (click)="deleteStudent(row.id)">Delete</button>
        </div>
      </div>
    </ng-template>
  </nimble-table-column>
</nimble-table>
